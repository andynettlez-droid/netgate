version: '3.8'

services:
  batfish:
    image: batfish/batfish:latest
    ports:
      - "9997:9997"
      - "9996:9996"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/approval_audit_trail.json:/app/approval_audit_trail.json
    environment:
      - PORT=8000
      - BATFISH_HOST=batfish
    depends_on:
      - batfish

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
